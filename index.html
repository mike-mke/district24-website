<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AA District 24 – Ozaukee County</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!--
    Note: Babel standalone loads js/index.js via XHR, which requires
    a web server. To run locally use:
      python3 -m http.server 8080
    then open http://localhost:8080 in your browser.
  -->

  <!-- React & Babel (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Data (plain JS — no JSX, loads as a regular script) -->
  <script src="js/data.js"></script>
</head>
<body>
  <div id="app"></div>

  <!-- Components & App (JSX — transpiled by Babel standalone) -->
  <script type="text/babel" src="js/index.js" data-presets="react"></script>
</body>
</html>
