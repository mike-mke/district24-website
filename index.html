<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AA District 24 – Ozaukee County</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!--
    src/ contains the JSX source, split into per-page and per-component
    files (src/pages, src/components, src/data.js, src/main.jsx entry).
    js/index.compiled.js is the bundled output (generated by build.sh).
    To rebuild locally: npm run build   (bundles src/main.jsx via esbuild)
  -->

  <!-- React (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
  <div id="app"></div>

  <!-- Bundled app (all pages/components/data in one file, no Babel needed at runtime) -->
  <script src="js/index.compiled.js"></script>
</body>
</html>
